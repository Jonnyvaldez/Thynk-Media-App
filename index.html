<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Thynk Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="hidden">
    <div class="login-card">
      <div class="login-logo">THYNK MEDIA</div>
      <input type="email" id="login-email" placeholder="Email" autocomplete="email">
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      <button id="login-btn">Sign in</button>
      <p id="login-error" class="error-text hidden"></p>
    </div>
  </div>

  <!-- Main app (hidden until logged in) -->
  <div id="app" class="hidden">

    <!-- Top bar -->
    <header class="topbar">
      <span class="topbar-brand">THYNK MEDIA</span>
      <button id="logout-btn" class="logout-btn">Sign out</button>
    </header>

    <!-- Tab content -->
    <main id="tab-content"></main>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-tab" data-tab="today">
        <span class="nav-icon">📋</span>
        <span class="nav-label">TODAY</span>
      </button>
      <button class="nav-tab" data-tab="clients">
        <span class="nav-icon">👥</span>
        <span class="nav-label">CLIENTS</span>
      </button>
      <button class="nav-tab" data-tab="pipeline">
        <span class="nav-icon">📈</span>
        <span class="nav-label">PIPELINE</span>
      </button>
      <button class="nav-tab" data-tab="warroom">
        <span class="nav-icon">⚔️</span>
        <span class="nav-label">WAR ROOM</span>
      </button>
    </nav>

  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- App scripts (order matters) -->
  <script src="js/supabase.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/today.js"></script>
  <script src="js/clients.js"></script>
  <script src="js/pipeline.js"></script>
  <script src="js/warroom.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
